# Single-leg IK mask probe: only leg index 0 participates in IK; others hold estimated pose.
# Used by `test_motion_performance_suite` case `single_leg_masked_stand`.

name = "single_leg_probe"
duration_ms = 4000
tick_ms = 20
refresh_motion_intent = true

[[events]]
at_ms = 0
mode = "STAND"
gait = "TRIPOD"
body_height_m = 0.14
speed_mps = 0.0
heading_rad = 0.0
yaw_rad = 0.0

[safety]
# Leg 0 only; order matches server leg index 0..5
legs_enabled = [true, false, false, false, false, false]
