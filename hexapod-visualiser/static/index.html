<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hexapod Visualiser</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: Inter, system-ui, Arial, sans-serif;
        background: #111827;
        color: #e5e7eb;
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100vh;
      }
      header {
        display: flex;
        gap: 1rem;
        align-items: flex-start;
        justify-content: space-between;
        padding: 0.7rem 1rem;
        background: #0b1220;
        border-bottom: 1px solid #1f2937;
      }
      .header-left {
        display: grid;
        gap: 0.35rem;
      }
      #status { font-size: 0.9rem; opacity: 0.9; }
      #status.stale { color: #fbbf24 !important; }

      #view-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
      }

      .view-button {
        font-size: 0.72rem;
        border: 1px solid #374151;
        background: #1f2937;
        color: #d1d5db;
        padding: 0.2rem 0.55rem;
        border-radius: 0.45rem;
        cursor: pointer;
      }

      .view-button:hover {
        border-color: #60a5fa;
        color: #bfdbfe;
      }

      #telemetry-panel {
        display: grid;
        gap: 0.45rem;
        justify-items: end;
        min-width: 20rem;
      }

      #rolling-metrics {
        display: flex;
        gap: 0.55rem;
        max-width: 28rem;
        font-size: 0.75rem;
        color: #9ca3af;
        overflow: hidden;
        white-space: nowrap;
      }

      #meta { font-size: 0.85rem; opacity: 0.8; text-align: right; }
      canvas { width: 100%; height: 100%; display: block; touch-action: none; }
    </style>
  </head>
  <body>
    <header>
      <div class="header-left">
        <strong>Hexapod Visualiser</strong>
        <div id="status">Connecting...</div>
        <div id="view-controls" aria-label="Camera view controls">
          <button class="view-button" type="button" data-view="top">Top</button>
          <button class="view-button" type="button" data-view="front">Front</button>
          <button class="view-button" type="button" data-view="side">Side</button>
          <button class="view-button" type="button" data-view="reset">Reset View</button>
        </div>
      </div>
      <div id="telemetry-panel">
        <div id="rolling-metrics"></div>
        <div id="meta"></div>
      </div>
    </header>
    <canvas id="scene"></canvas>
    <script type="module" src="/app.js"></script>
  </body>
</html>
